name: Daily Bible Post
on:
  schedule:
    - cron: '0 12 * * *' # Runs daily at 12:00 PM UTC
  workflow_dispatch:

# Opt into Node.js 24 for all steps in this workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Updated to v5 (Supports Node 24)
      - name: Checkout Repo
        uses: actions/checkout@v5

      # Updated to v6 (Supports Node 24)
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12' # Using a modern Python version

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python main.py

      - name: Keep Repo Alive
        run: |
          git config --global user.name "BibleBot"
          git config --global user.email "bot@github.com"
          git add post.jpg
          git commit -m "Update daily post image" || exit 0
          git push
