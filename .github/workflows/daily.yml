name: Daily Bible Post

on:
  schedule:
    - cron: '0 12 * * *' # Runs daily at 12:00 UTC
  workflow_dispatch:      # Allows you to run it manually for testing

permissions:
  contents: write         # Required to push the image back to your repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests Pillow

      # STEP 1: Generate the image locally on the runner
      - name: Create Image
        run: |
          python main.py
          ls -la
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}

      # STEP 2: Upload the image to your GitHub repo
      # This makes the image publicly accessible via raw.githubusercontent.com
      - name: Commit and Push Image
        run: |
          git config --global user.name "BibleBot"
          git config --global user.email "bot@github.com"
          git add post.jpg
          git commit -m "Update daily post image" || echo "No changes"
          git push

      # STEP 3: Now tell Instagram to fetch that new image
      - name: Post to Instagram
        run: python -c "import main; main.post_to_instagram()"
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
